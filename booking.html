<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Booking Form</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f2f2f2;
}

.container{
    width:400px;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

h2{
    text-align:center;
}

label{
    font-weight:bold;
}

input, select{
    width:100%;
    padding:10px;
    margin:8px 0 15px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#064d61;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#043b4a;
}
</style>

</head>
<body>

<div class="container">

<h2>Car Booking Form</h2>

<form onsubmit="return confirmBooking()">

<label>Full Name</label>
<input type="text" placeholder="Enter your name" required>

<label>Mobile Number</label>
<input type="tel" placeholder="Enter mobile number" required>

<label>Email</label>
<input type="email" placeholder="Enter email" required>

<label>Select Car</label>
<select required>
    <option>Maruti Swift</option>
    <option>Baleno</option>
    <option>Hyundai i20</option>
    <option>Hyundai Creta</option>
    <option>Toyota Innova</option>
</select>

<label>Pickup Date</label>
<input type="date" required>

<label>Return Date</label>
<input type="date" required>

<label>Pickup Location</label>
<input type="text" placeholder="Enter pickup location" required>

<label>Payment Method</label>
<select required>
    <option>UPI</option>
    <option>Credit Card</option>
    <option>Debit Card</option>
    <option>Cash</option>
</select>

<button type="submit">Confirm Booking</button>


</form>

</div>

<script>
function confirmBooking() {

    alert("🎉 Booking Confirmed Successfully!");

    return true;   
</script>
</body>
</html>
