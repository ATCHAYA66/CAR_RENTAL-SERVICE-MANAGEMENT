<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Car Rental & Services</title>
    <style>
         body{
        background-color : #7ecbe0;
        text-align : center;
        font-family : Arial;
         }
         div{
            background-color: rgb(136, 183, 223);
            width: 450px;
            margin: 100px auto;
            padding: 25px;
            border: 1px solid #ccc;
            border-radius: 10px;
         }
         input{
            width: 400px;
            padding: 10px;
         }
         button{
            width:420px;
            padding: 10px;
            background-color: #1e3a5f;
            color: white;
            border: none;
            border-radius: 5px;
         }
    </style>
</head>
<body>
    <div>
    <a href="index.html">Home</a>

    <h2>Create Account</h2>
    <p>Sign up to get our car rental and service facilities</p>

    <label>Name</label><br>
    <input type="text" placeholder="Enter your name">

    <br><br>

    <label>Email Address</label><br>
    <input type="email" placeholder="Example: car23@gmail.com">

    <br><br>

    <label>Phone Number</label><br>
    <input type="tel" placeholder="Enter your phone number">

    <br><br>

    <label>Create Password</label><br>
    <input type="password" placeholder="Create a password">

    <br><br>

    <label>Confirm Password</label><br>
    <input type="password" placeholder="Enter password again">

    <br><br>

    <button>Sign Up</button>

    <p>Already have an account? <a href="login.html">Login</a></p>
</div>
</body>
</html>
